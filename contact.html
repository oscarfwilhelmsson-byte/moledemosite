<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Linne Atelier</title>
    <meta
      name="description"
      content="Request the Linne Atelier lookbook or book a private interior viewing."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Schibsted+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="contact-page">
    <header class="topbar">
      <a href="index.html" class="brand">Linne Atelier</a>
      <nav class="topbar__nav">
        <a href="index.html#collection">Collection</a>
        <a href="index.html#materials">Materials</a>
        <a href="contact.html">Journal</a>
      </nav>
      <a href="contact.html" class="button button--nav">Book a viewing</a>
    </header>

    <main class="contact-main">
      <section class="contact-hero">
        <div class="contact-hero__copy">
          <p class="eyebrow eyebrow--soft">Private viewing</p>
          <h1 class="title_hero">Request the lookbook or book a quiet studio appointment.</h1>
          <p class="hero__lede hero__lede--dark">
            Share a few details and we will send the current collection or arrange a personal
            walkthrough of selected pieces.
          </p>
        </div>

        <form class="form-card">
          <label>
            Full name
            <input type="text" name="name" placeholder="Elsa Lindberg" />
          </label>
          <label>
            Email
            <input type="email" name="email" placeholder="elsa@home.se" />
          </label>
          <label>
            Interest
            <select name="interest">
              <option value="">Select one</option>
              <option>Lookbook request</option>
              <option>Private viewing</option>
              <option>Interior project</option>
            </select>
          </label>
          <label>
            Notes
            <textarea
              name="details"
              rows="6"
              placeholder="I am looking for pieces for a warm minimal living room in natural oak and linen tones."
            ></textarea>
          </label>
          <button type="submit" class="button button_primary">Send request</button>
        </form>
      </section>
    </main>

    <script
      src="https://møle.com/embed.js"
      data-token="cs-d4bee82b-1b47-4c18-8f8e-a85fb64a5400"
    ></script>
  </body>
</html>
